<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>考試倒數計算機</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .tab-btn {
      padding: 10px 20px;
      border: 2px solid #333;
      border-radius: 12px;
      background: #16162a;
      color: #888;
      font-size: 0.95em;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
    }

    .tab-btn:hover {
      border-color: #667eea;
      color: #667eea;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-color: transparent;
      color: #fff;
    }

    .container {
      background: #1a1a2e;
      border-radius: 20px;
      padding: 40px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    h1 {
      text-align: center;
      font-size: 1.8em;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      text-align: center;
      color: #888;
      font-size: 0.9em;
      margin-bottom: 30px;
    }

    .input-group { margin-bottom: 24px; text-align: center; }


    .input-group label { text-align: left; }

    .input-wrap {
      position: relative;
      width: 100%;
      max-width: 300px;
      margin: 0 auto;
    }

    .input-wrap input[type="date"] {
      width: 100%;
      box-sizing: border-box;
    }

    .input-error {
      color: #ff6b6b;
      font-size: 0.85em;
      margin-top: 6px;
      min-height: 1.2em;
      text-align: center;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #aaa;
      font-size: 0.95em;
    }

    input[type="date"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #333;
      border-radius: 12px;
      background: #16162a;
      color: #fff;
      font-size: 1em;
      transition: border-color 0.3s;
      color-scheme: dark;
    }

    input[type="date"]:focus {
      outline: none;
      border-color: #667eea;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 1.1em;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:active { transform: translateY(0); }

    #result { display: none; margin-top: 30px; text-align: center; }

    .exam-info {
      background: #16213e;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .exam-info h2 {
      font-size: 1.1em;
      color: #667eea;
      margin-bottom: 12px;
    }

    .exam-year {
      font-size: 2.2em;
      font-weight: bold;
      background: linear-gradient(135deg, #f093fb, #f5576c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .exam-date { color: #bbb; font-size: 0.95em; }

    .countdown-section {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 20px;
      justify-content: center;
    }


    .countdown-item {
      background: #0f0f1a;
      border-radius: 12px;
      padding: 16px 8px;
      min-width: 0;
      white-space: nowrap;
      text-align: center;
    }

    .countdown-value {
      font-size: 2em;
      font-weight: bold;
      color: #fff;
      font-variant-numeric: tabular-nums;
      text-align: center;
      min-width: 1ch;
    }
    .countdown-label { font-size: 0.8em; color: #666; margin-top: 4px; }

    .status {
      margin-top: 16px;
      padding: 10px;
      border-radius: 8px;
      font-size: 0.85em;
    }

    .status.info {
      background: rgba(102, 126, 234, 0.15);
      color: #667eea;
    }

    .status.estimated {
      background: rgba(255, 183, 77, 0.12);
      color: #ffb74d;
    }

    .past-warning {
      background: rgba(245, 87, 108, 0.15);
      color: #ff6b6b;
      padding: 16px;
      border-radius: 12px;
      margin-top: 16px;
      font-size: 0.95em;
    }

    .history-table {
      width: 100%;
      margin-top: 24px;
      border-collapse: collapse;
      font-size: 0.85em;
    }

    .history-table th, .history-table td {
      padding: 8px;
      text-align: center;
      border-bottom: 1px solid #333;
    }

    .history-table th { color: #667eea; }
    .history-table td { color: #aaa; }

    .est-tag {
      display: inline-block;
      background: rgba(255, 183, 77, 0.2);
      color: #ffb74d;
      font-size: 0.75em;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 4px;
    }

    .exam-panel { display: none; }
    .exam-panel.active { display: block; }
  </style>
</head>
<body>
  <div class="tabs">
    <button class="tab-btn active" data-tab="csat" onclick="switchTab('csat')">學測</button>
    <button class="tab-btn" data-tab="tve" onclick="switchTab('tve')">統測</button>
  </div>

  <!-- ===== 學測 panel ===== -->
  <div id="panel-csat" class="exam-panel active">
    <div class="container">
      <h1>🎓 學測倒數計算機</h1>
      <p class="subtitle">輸入出生日期，預測學測時間</p>

      <div class="input-group">
        <label for="birthdate-csat">出生日期</label>
        <div class="input-wrap">
          <input type="date" id="birthdate-csat">
        </div>
        <div class="input-error" id="error-csat"></div>
      </div>

      <button class="btn btn-primary" onclick="calculate('csat')">開始倒數</button>

      <div id="result-csat">
        <div class="exam-info">
          <h2>📋 預測學測資訊</h2>
          <div class="exam-year" id="examYear-csat">—</div>
          <div class="exam-date" id="examDateDisplay-csat">—</div>
        </div>

        <div class="countdown-section">
          <div class="countdown-item">
            <div class="countdown-value" id="days-csat">—</div>
            <div class="countdown-label">天</div>
          </div>
          <div class="countdown-item">
            <div class="countdown-value" id="hours-csat">—</div>
            <div class="countdown-label">時</div>
          </div>
          <div class="countdown-item">
            <div class="countdown-value" id="minutes-csat">—</div>
            <div class="countdown-label">分</div>
          </div>
          <div class="countdown-item">
            <div class="countdown-value" id="seconds-csat">—</div>
            <div class="countdown-label">秒</div>
          </div>
        </div>

        <div class="status info" id="statusInfo-csat"></div>
        <div id="pastWarning-csat" class="past-warning" style="display:none;"></div>
      </div>

      <h3 style="margin-top:40px; color:#667eea; font-size:1em;">📜 歷年學測日期</h3>
      <table class="history-table">
        <thead>
          <tr><th>年度</th><th>考試日期</th><th>報名期間</th></tr>
        </thead>
        <tbody id="historyBody-csat"></tbody>
      </table>
    </div>
  </div>

  <!-- ===== 統測 panel ===== -->
  <div id="panel-tve" class="exam-panel">
    <div class="container">
      <h1>🔧 統測倒數計算機</h1>
      <p class="subtitle">輸入出生日期，預測統測時間</p>

      <div class="input-group">
        <label for="birthdate-tve">出生日期</label>
        <div class="input-wrap">
          <input type="date" id="birthdate-tve">
        </div>
        <div class="input-error" id="error-tve"></div>
      </div>

      <button class="btn btn-primary" onclick="calculate('tve')">開始倒數</button>

      <div id="result-tve">
        <div class="exam-info">
          <h2>📋 預測統測資訊</h2>
          <div class="exam-year" id="examYear-tve">—</div>
          <div class="exam-date" id="examDateDisplay-tve">—</div>
        </div>

        <div class="countdown-section">
          <div class="countdown-item">
            <div class="countdown-value" id="days-tve">—</div>
            <div class="countdown-label">天</div>
          </div>
          <div class="countdown-item">
            <div class="countdown-value" id="hours-tve">—</div>
            <div class="countdown-label">時</div>
          </div>
          <div class="countdown-item">
            <div class="countdown-value" id="minutes-tve">—</div>
            <div class="countdown-label">分</div>
          </div>
          <div class="countdown-item">
            <div class="countdown-value" id="seconds-tve">—</div>
            <div class="countdown-label">秒</div>
          </div>
        </div>

        <div class="status info" id="statusInfo-tve"></div>
        <div id="pastWarning-tve" class="past-warning" style="display:none;"></div>
      </div>

      <h3 style="margin-top:40px; color:#667eea; font-size:1em;">📜 歷年統測日期</h3>
      <table class="history-table">
        <thead>
          <tr><th>年度</th><th>考試日期</th><th>報名期間</th></tr>
        </thead>
        <tbody id="historyBody-tve"></tbody>
      </table>
    </div>
  </div>

  <script>
    // ============================================================
    // 歷年學測日期資料（1月舉行）
    // ============================================================
    const csatHistory = [
      { year: 2028, month: 1, day: 22, registerStart: "2027-11-03", estimated: true },
      { year: 2027, month: 1, day: 22, registerStart: "2026-11-04", estimated: false },
      { year: 2026, month: 1, day: 20, registerStart: "2025-10-29", estimated: false },
      { year: 2025, month: 1, day: 21, registerStart: "2024-10-29", estimated: false },
      { year: 2024, month: 1, day: 20, registerStart: "2023-10-31", estimated: false },
      { year: 2023, month: 1, day: 13, registerStart: "2022-10-25", estimated: false },
      { year: 2022, month: 1, day: 21, registerStart: "2021-10-26", estimated: false },
      { year: 2021, month: 1, day: 22, registerStart: "2020-10-27", estimated: false },
      { year: 2020, month: 1, day: 17, registerStart: "2019-10-24", estimated: false },
      { year: 2019, month: 1, day: 25, registerStart: "2018-10-25", estimated: false },
      { year: 2018, month: 1, day: 26, registerStart: "2017-10-26", estimated: false },
      { year: 2017, month: 1, day: 20, registerStart: "2016-10-27", estimated: false },
    ];

    // ============================================================
    // 歷年統測日期資料（4月底～5月初舉行，第一天為週六）
    // 資料來源：技專校院入學測驗中心、大學問、考友社等
    // ============================================================
    const tveHistory = [
      { year: 2028, month: 4, day: 26, registerStart: "2027-12-09", estimated: true },
      { year: 2027, month: 4, day: 25, registerStart: "2026-12-09", estimated: true },
      { year: 2026, month: 4, day: 25, registerStart: "2025-12-09", estimated: false },
      { year: 2025, month: 4, day: 26, registerStart: "2024-12-10", estimated: false },
      { year: 2024, month: 4, day: 27, registerStart: "2023-12-07", estimated: false },
      { year: 2023, month: 4, day: 29, registerStart: "2022-12-08", estimated: false },
      { year: 2022, month: 4, day: 30, registerStart: "2021-12-09", estimated: false },
      { year: 2021, month: 5, day: 1,  registerStart: "2020-12-10", estimated: false },
      { year: 2020, month: 5, day: 2,  registerStart: "2019-12-12", estimated: false },
      { year: 2019, month: 5, day: 4,  registerStart: "2018-12-13", estimated: false },
      { year: 2018, month: 5, day: 5,  registerStart: "2017-12-14", estimated: false },
      { year: 2017, month: 5, day: 6,  registerStart: "2016-12-15", estimated: false },
    ];

    const countdownIntervals = { csat: null, tve: null };

    function switchTab(tab) {
      // Stop the countdown of the panel being left so the hidden DOM
      // doesn't keep mutating and we don't leak a setInterval per tab.
      const otherType = tab === 'csat' ? 'tve' : 'csat';
      if (countdownIntervals[otherType]) {
        clearInterval(countdownIntervals[otherType]);
        countdownIntervals[otherType] = null;
      }
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.exam-panel').forEach(p => p.classList.remove('active'));
      const btn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
      if (btn) btn.classList.add('active');
      const panel = document.getElementById(`panel-${tab}`);
      if (panel) panel.classList.add('active');
    }

    function getExamDateByType(examYear, type) {
      const history = type === 'csat' ? csatHistory : tveHistory;
      const defaultMonth = type === 'csat' ? 0 : 3;
      const found = history.find(e => e.year === examYear);
      if (found) return new Date(found.year, found.month - 1, found.day);
      return new Date(examYear, defaultMonth, 28);
    }

    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}/${m}/${d}`;
    }

    function renderHistory(type) {
      const history = type === 'csat' ? csatHistory : tveHistory;
      const examName = type === 'csat' ? '學測' : '統測';
      const tbody = document.getElementById(`historyBody-${type}`);
      tbody.innerHTML = history.map(e => {
        const examStr = `${e.year}/${String(e.month).padStart(2,'0')}/${String(e.day).padStart(2,'0')}`;
        const estTag = e.estimated ? '<span class="est-tag">預估</span>' : '';
        const regStr = e.registerStart.replace(/-/g, '/');
        return `<tr>
          <td>${e.year - 1912}</td>
          <td>${examStr}${estTag}</td>
          <td>${regStr}</td>
        </tr>`;
      }).join('');
    }

    function calculate(type) {
      const birthVal = document.getElementById(`birthdate-${type}`).value;
      if (!birthVal) { document.getElementById(`error-${type}`).textContent = '請輸入出生日期'; return; }

      if (countdownIntervals[type]) clearInterval(countdownIntervals[type]);

      // Parse YYYY-MM-DD in local time (new Date(string) treats it as UTC,
      // which shifts the year backward by one for users in negative-UTC timezones).
      const parts = birthVal.split('-').map(Number);
      const birth = new Date(parts[0], parts[1] - 1, parts[2]);
      if (isNaN(birth.getTime())) { document.getElementById(`error-${type}`).textContent = '請輸入有效的出生日期'; return; }
      const now = new Date();

      // Taiwan's school-year cutoff is Sept 1. Students born Sept–Dec start
      // school the following September, so they graduate (and sit the exam)
      // a year later than the simple +18 formula would predict.
      const examYear = birth.getFullYear() + (birth.getMonth() >= 8 ? 19 : 18);
      const examDate = getExamDateByType(examYear, type);
      // CSAT is a 3-day exam (day 1, 2, 3), TVE is a 2-day exam. Use the
      // last day for the "is the exam over?" check so the past warning
      // doesn't fire while the student is actually sitting the exam.
      const examEndDate = new Date(examDate);
      examEndDate.setDate(examEndDate.getDate() + (type === 'csat' ? 2 : 1));
      const isPast = examEndDate < now;

      const history = type === 'csat' ? csatHistory : tveHistory;
      const found = history.find(e => e.year === examYear);
      const isEstimated = found ? found.estimated : true;
      const examName = type === 'csat' ? '學測' : '統測';

      document.getElementById(`examYear-${type}`).textContent = `${examYear - 1912} 學年度`;
      document.getElementById(`examDateDisplay-${type}`).textContent =
        `${examName}日期：${formatDate(examDate)}${isEstimated ? '（預估）' : ''}`;

      const diff = examDate - now;
      const daysUntil = Math.floor(diff / (24 * 60 * 60 * 1000));

      const statusInfo = document.getElementById(`statusInfo-${type}`);
      statusInfo.className = 'status ' + (isEstimated ? 'estimated' : 'info');
      let statusText = '';

      if (isPast) {
        statusText = '⚠️ 這位考生應該已經完成考試了，或為特殊入學情形。';
      } else if (daysUntil < 0) {
        statusText = '📝 考試進行中，祝福你一切順利！';
      } else if (isEstimated) {
        statusText = '📌 此為根據歷年規律推估的日期，正式日程請留意相關單位公告。';
      } else if (daysUntil > 365) {
        statusText = `還有約 ${Math.floor(daysUntil / 365)} 年又 ${daysUntil % 365} 天！好好珍惜校園生活 😊`;
      } else if (daysUntil > 180) {
        statusText = `大約還有 ${Math.floor(daysUntil / 30)} 個月的時間，加油！💪`;
      } else if (daysUntil > 90) {
        statusText = `剩下大約 ${Math.floor(daysUntil / 7)} 週了，開始倒數！📚`;
      } else if (daysUntil > 30) {
        statusText = `還有大約 ${daysUntil} 天！時間過得很快，要加緊腳步！🔥`;
      } else if (daysUntil > 7) {
        statusText = `只剩 ${daysUntil} 天！衝刺階段，加油！💪`;
      } else {
        statusText = `只剩不到一週！全力衝刺！🌟`;
      }

      statusInfo.textContent = statusText;

      const pastWarning = document.getElementById(`pastWarning-${type}`);
      if (isPast) {
        pastWarning.style.display = 'block';
        pastWarning.innerHTML = `📌 這個出生日期對應的${examName}（${examYear - 1912} 學年度）已在 ${formatDate(examDate)} 結束。如為復考生，請忽略此倒數。`;
      } else {
        pastWarning.style.display = 'none';
      }

      document.getElementById(`result-${type}`).style.display = 'block';
      updateCountdown(type, examDate);
      countdownIntervals[type] = setInterval(() => updateCountdown(type, examDate), 1000);
    }

    function updateCountdown(type, examDate) {
      const now = new Date();
      const diff = examDate - now;

      if (diff <= 0) {
        document.getElementById(`days-${type}`).textContent = '0';
        document.getElementById(`hours-${type}`).textContent = '0';
        document.getElementById(`minutes-${type}`).textContent = '0';
        document.getElementById(`seconds-${type}`).textContent = '0';
        if (countdownIntervals[type]) { clearInterval(countdownIntervals[type]); countdownIntervals[type] = null; }
        return;
      }

      const d = Math.floor(diff / (24 * 60 * 60 * 1000));
      const h = Math.floor((diff % (24 * 60 * 60 * 1000)) / (60 * 60 * 1000));
      const m = Math.floor((diff % (60 * 60 * 1000)) / (60 * 1000));
      const s = Math.floor((diff % (60 * 1000)) / 1000);

      document.getElementById(`days-${type}`).textContent = d;
      document.getElementById(`hours-${type}`).textContent = h;
      document.getElementById(`minutes-${type}`).textContent = m;
      document.getElementById(`seconds-${type}`).textContent = s;
    }

    // 初始化
    renderHistory('csat');
    renderHistory('tve');
  </script>
</body>
</html>
